<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>powerwash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #06080b; overscroll-behavior: none; }
  body { font: 500 13px -apple-system, system-ui, sans-serif; color: #fff; }

  /* Canvas is positioned absolutely with letterboxing offsets set from JS.
     touch-action stays none ON the canvas only — outside the canvas (HUD,
     overlays, lil-gui) we want normal pointer behavior. */
  #stage { position: absolute; touch-action: none; image-rendering: pixelated; }

  /* HUD */
  #hud {
    display: none;
    position: fixed; top: calc(12px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    z-index: 5; gap: 14px; align-items: center;
    background: rgba(0,0,0,0.4); padding: 8px 14px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  body.overlay-open #hud { opacity: 0; }
  body.overlay-open #reset { opacity: 0; pointer-events: none; }
  #hud .label { font-size: 11px; opacity: 0.7; letter-spacing: 0.04em; text-transform: uppercase; }
  #hud .val { font-size: 13px; font-variant-numeric: tabular-nums; }
  #waterBar {
    width: 110px; height: 8px; border-radius: 4px;
    background: rgba(255,255,255,0.12); overflow: hidden;
  }
  #waterFill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #7cc4ff, #4ea4ff);
    transition: width 0.05s linear;
  }

  /* Bottom-right control cluster (cross-platform — touch and desktop both
     get visible buttons; keyboard/gamepad just shortcut to the same actions). */
  .ctl-cluster { position: fixed; bottom: calc(12px + env(safe-area-inset-bottom)); right: 12px; z-index: 10; display: flex; gap: 8px; }
  .ctl-cluster button {
    background: rgba(0,0,0,0.4); color: #fff; border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 14px; border-radius: 999px; font: 500 13px -apple-system, system-ui, sans-serif;
    backdrop-filter: blur(8px); cursor: pointer;
    transition: opacity 0.2s ease, background 0.15s ease;
  }
  .ctl-cluster button:hover { background: rgba(0,0,0,0.55); }
  body.overlay-open .ctl-cluster { opacity: 0; pointer-events: none; }

  /* Controls hint (desktop only — hidden on touch via JS feature check) */
  #hint {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    z-index: 5; font-size: 11px; color: rgba(255,255,255,0.45);
    letter-spacing: 0.05em; text-transform: uppercase;
    pointer-events: none;
  }
  body.overlay-open #hint { opacity: 0; }

  /* FPS counter (debug) */
  #fps {
    position: fixed; bottom: calc(12px + env(safe-area-inset-bottom)); left: 12px; z-index: 5;
    font-size: 11px; color: #9cf; opacity: 0.7;
    background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 6px;
    font-variant-numeric: tabular-nums; display: none;
  }
  #fps.show { display: block; }

  /* Compatibility shim: the older #reset id retains its style via the cluster
     rule above; this block was deliberately removed when refactoring to a cluster. */

  /* Pause overlay — light, fast to dismiss */
  #pauseOverlay {
    position: fixed; inset: 0; z-index: 15;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(6px);
    pointer-events: none;
  }
  #pauseOverlay.show { display: flex; }
  #pauseOverlay .pill {
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.18);
    padding: 14px 22px; border-radius: 999px; font-size: 14px; letter-spacing: 0.04em;
  }

  /* Modal overlays (end screen, shop) */
  .overlay {
    position: fixed; inset: 0; z-index: 20;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(10px);
  }
  .overlay.show { display: flex; }
  .panel {
    background: #1b2028; border: 1px solid rgba(255,255,255,0.14);
    border-radius: 14px; padding: 22px 24px; min-width: 320px; max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .panel h2 { font-size: 22px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.01em; }
  .panel .stats { display: grid; grid-template-columns: 1fr auto; gap: 6px 16px; margin: 10px 0 18px; }
  .panel .stats .k { opacity: 0.65; font-size: 13px; }
  .panel .stats .v { font-variant-numeric: tabular-nums; font-weight: 600; }
  .panel .verdict { font-size: 13px; opacity: 0.8; margin-bottom: 12px; }
  .panel .row { display: flex; gap: 10px; margin-top: 14px; }
  .panel button {
    flex: 1; padding: 12px 16px; border-radius: 10px;
    background: #4ea4ff; color: #07101c; border: 0; font: 600 14px -apple-system, system-ui, sans-serif;
    cursor: pointer;
  }
  .panel button.secondary { background: rgba(255,255,255,0.1); color: #fff; }
  .panel button:active { transform: translateY(1px); }
  .panel button:hover { filter: brightness(1.07); }

  .upgrade-list { display: flex; flex-direction: column; gap: 8px; }
  .upgrade {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; background: rgba(255,255,255,0.04); border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .upgrade .name { font-weight: 600; }
  .upgrade .lvl { font-size: 11px; opacity: 0.6; letter-spacing: 0.04em; }
  .upgrade .meta { display: flex; flex-direction: column; }
  .upgrade button {
    padding: 6px 12px; flex: 0 0 auto; border-radius: 8px; font-size: 12px;
  }
  .upgrade button:disabled { opacity: 0.35; cursor: not-allowed; }
  .currency-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .currency { font-size: 18px; font-weight: 700; color: #ffd97a; }
</style>
  <script type="module" crossorigin src="/psx-powerwash/assets/index-DcMvkfzK.js"></script>
</head>
<body>
<canvas id="stage"></canvas>

<div id="hud">
  <div>
    <div class="label">water</div>
    <div id="waterBar"><div id="waterFill"></div></div>
  </div>
  <div>
    <div class="label">clean</div>
    <div class="val" id="cleanVal">0%</div>
  </div>
  <div>
    <div class="label">time</div>
    <div class="val" id="timeVal">0.0</div>
  </div>
</div>

<div class="ctl-cluster">
  <button id="pauseBtn" title="pause (Esc)">pause</button>
  <button id="reset" title="restart (R)">restart · R</button>
</div>
<div id="fps">— fps</div>
<div id="hint">drag to throw · WASD/arrows to thrust · esc to pause · R to restart</div>

<div id="pauseOverlay"><div class="pill">paused — esc to resume</div></div>

<div id="endOverlay" class="overlay">
  <div class="panel">
    <h2 id="endTitle">clean!</h2>
    <div class="verdict" id="endVerdict"></div>
    <div class="stats">
      <div class="k">time</div>      <div class="v" id="endTime">—</div>
      <div class="k">% cleaned</div> <div class="v" id="endClean">—</div>
      <div class="k">water left</div><div class="v" id="endWater">—</div>
      <div class="k">efficiency</div><div class="v" id="endEff">—</div>
      <div class="k">earned</div>    <div class="v" id="endEarned">—</div>
    </div>
    <div class="row">
      <button id="endContinue">upgrades →</button>
    </div>
  </div>
</div>

<div id="shopOverlay" class="overlay">
  <div class="panel">
    <h2>upgrades</h2>
    <div class="currency-row">
      <div class="label">bubbles</div>
      <div class="currency" id="shopBalance">0</div>
    </div>
    <div class="upgrade-list" id="upgradeList"></div>
    <div class="row">
      <button id="shopStart">start run</button>
    </div>
  </div>
</div>

</body>
</html>
